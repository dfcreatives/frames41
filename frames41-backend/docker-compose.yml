version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: frames41-postgres
    environment:
      POSTGRES_USER: frames41
      POSTGRES_PASSWORD: frames41_secret
      POSTGRES_DB: frames41
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frames41 -d frames41"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: frames41-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: frames41-app
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://frames41:frames41_secret@postgres:5432/frames41?schema=public
      PORT: 3000
      JWT_ACCESS_SECRET: dev-access-secret-key-at-least-32-characters-long
      JWT_REFRESH_SECRET: dev-refresh-secret-key-at-least-32-characters-long
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: sh -c "npm run db:migrate:prod && npm run dev"

volumes:
  postgres_data:
  minio_data:
